<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff007a;stop-opacity:1" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Заливка секторов (как на колесе в приложении) -->
    <circle cx="50" cy="50" r="40" fill="rgba(0, 212, 255, 0.2)" />
    <path d="M50,50 L50,10 A40,40 0 0,1 90,50 Z" fill="rgba(255, 0, 122, 0.4)" />
    <path d="M50,50 L90,50 A40,40 0 0,1 50,90 Z" fill="rgba(112, 0, 255, 0.4)" />
    <path d="M50,50 L50,90 A40,40 0 0,1 10,50 Z" fill="rgba(0, 255, 157, 0.4)" />
    <path d="M50,50 L10,50 A40,40 0 0,1 50,10 Z" fill="rgba(255, 204, 0, 0.4)" />

    <!-- Внешний обод -->
    <circle cx="50" cy="50" r="42" fill="none" stroke="white" stroke-width="2" opacity="0.8" />
    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)" />
    
    <!-- Спицы (много и ярких) -->
    <g stroke="white" stroke-width="1.5" opacity="0.6">
        <line x1="50" y1="10" x2="50" y2="90" />
        <line x1="10" y1="50" x2="90" y2="50" />
        <line x1="21" y1="21" x2="79" y2="79" />
        <line x1="79" y1="21" x2="21" y2="79" />
        <!-- Доп спицы для густоты -->
        <line x1="50" y1="10" x2="50" y2="90" transform="rotate(22.5 50 50)" />
        <line x1="10" y1="50" x2="90" y2="50" transform="rotate(22.5 50 50)" />
    </g>

    <!-- Центр -->
    <circle cx="50" cy="50" r="6" fill="white" filter="url(#glow)" />
</svg>
